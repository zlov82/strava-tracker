spring:
  application:
    name: strava

  datasource:
    url: jdbc:postgresql://localhost:5432/strava
    username: strava
    password: strava
    driver-class-name: org.postgresql.Driver

  jackson:
    deserialization:
      fail-on-unknown-properties: false

  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

logging:
  file:
    name: /app/logs/app.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 7

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

strava:
  client-id: ${STRAVA_CLIENT_ID:not-set}
  client-secret: ${STRAVA_CLIENT_SECRET:not-set}
  redirect-uri: ${STRAVA_REDIRECT_URI:http://localhost:8080/auth/callback}
  athlete-id: ${STRAVA_ATHLETE_ID:133817559}

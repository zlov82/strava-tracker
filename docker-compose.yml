services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: strava
      POSTGRES_USER: strava
      POSTGRES_PASSWORD: strava
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/strava
      SPRING_DATASOURCE_USERNAME: strava
      SPRING_DATASOURCE_PASSWORD: strava
      STRAVA_CLIENT_ID: ${STRAVA_CLIENT_ID}
      STRAVA_CLIENT_SECRET: ${STRAVA_CLIENT_SECRET}
      STRAVA_REDIRECT_URI: ${STRAVA_REDIRECT_URI:-http://localhost/auth/callback}
      STRAVA_ATHLETE_ID: ${STRAVA_ATHLETE_ID:-133817559}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-https://strava.app.zlov.xyz}
    volumes:
      - ./logs:/app/logs
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
      args:
        VITE_SHOW_ACTIVITY_MAP: ${SHOW_ACTIVITY_MAP:-true}
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
